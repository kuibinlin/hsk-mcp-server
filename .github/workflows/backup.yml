name: Monthly D1 Backup

on:
  schedule:
    - cron: "0 6 1 * *" # 1st of each month at 06:00 UTC
  workflow_dispatch: # allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: backups
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Export D1 database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p backups
          TIMESTAMP=$(date +%Y-%m-%d)
          pnpm exec wrangler d1 export DB --remote --output=backups/hsk_db_${TIMESTAMP}.sql

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git commit -m "D1 backup $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push origin backups
